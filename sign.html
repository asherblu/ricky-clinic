<!DOCTYPE html>
<!--
sign.html — דף חתימה דיגיטלית ציבורי (ללא התחברות)
נועד לשיתוף עם מטופלים דרך קישור אישי: sign.html?token=XXXX
קורא/כותב למסמך יחיד באוסף Firestore העליון publicForms/{token} בלבד.
דורש כללי אבטחה (Firestore Security Rules) ייעודיים למסמך זה — ראה תיעוד בהודעת המסירה.
גרסה: 2.5 (נוסף פאד חתימה ידנית בעכבר/אצבע/עט + שדה תעודת זהות אופציונלי; חתימה דיגיטלית דורשת גם שם וגם ציור חתימה)
-->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>חתימה על מסמך — מרפאה כרטיסי מטופלים</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Heebo, Arial, sans-serif; background: #FAF7F1; color: #2A2A24; }
  input, textarea { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcY7bdaNAfBzl9DNnzvKMYBYt59eV_5HI",
    authDomain: "ricky-clinic.firebaseapp.com",
    projectId: "ricky-clinic",
    storageBucket: "ricky-clinic.firebasestorage.app",
    messagingSenderId: "833263468591",
    appId: "1:833263468591:web:2a809e1b4852fd6c3886da",
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.fbSign = {
    getDoc: (token) => getDoc(doc(db, "publicForms", token)),
    signDoc: (token, signatureName, signatureId, signatureImage) => updateDoc(doc(db, "publicForms", token), {
      status: "signed", signedAt: new Date().toISOString(), signatureName, signatureId, signatureImage,
    }),
    // מסמך ציבורי משותף (allow get: if true) — אין צורך ב-Firebase Storage כלל.
    getPublicConfig: async () => {
      try {
        const snap = await getDoc(doc(db, "public", "config"));
        return snap.exists() ? snap.data() : {};
      } catch { return {}; }
    },
  };
  window.dispatchEvent(new Event("fb-sign-ready"));
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const COLORS = { bg: "#FAF7F1", surface: "#FFFFFF", primary: "#24443F", clay: "#C17A52", text: "#2A2A24", muted: "#8C8577", border: "#E7E1D3", danger: "#AE4F45", success: "#2E7D32" };

function waitForFbSign() {
  if (window.fbSign) return Promise.resolve(window.fbSign);
  return new Promise((resolve) => window.addEventListener("fb-sign-ready", () => resolve(window.fbSign), { once: true }));
}

function SignaturePad({ onChange }) {
  const canvasRef = useRef(null);
  const drawingRef = useRef(false);

  function getPos(e) {
    const rect = canvasRef.current.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  }
  function start(e) {
    e.preventDefault();
    drawingRef.current = true;
    const ctx = canvasRef.current.getContext("2d");
    const { x, y } = getPos(e);
    ctx.beginPath();
    ctx.moveTo(x, y);
  }
  function move(e) {
    if (!drawingRef.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const { x, y } = getPos(e);
    ctx.lineWidth = 2.2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#24443F";
    ctx.lineTo(x, y);
    ctx.stroke();
  }
  function end() {
    if (!drawingRef.current) return;
    drawingRef.current = false;
    onChange(canvasRef.current.toDataURL("image/png"));
  }
  function clear() {
    const canvas = canvasRef.current;
    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
    onChange(null);
  }

  return (
    <div>
      <canvas ref={canvasRef} width={400} height={130}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}
        style={{ width: "100%", maxWidth: 400, height: 130, border: `1px dashed #C17A52`, borderRadius: 8, background: "#fff", touchAction: "none", cursor: "crosshair" }} />
      <button type="button" onClick={clear} style={{ marginTop: 6, background: "none", border: "none", color: "#8C8577", fontSize: 12, textDecoration: "underline", cursor: "pointer" }}>ניקוי חתימה</button>
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState("loading"); // loading | notfound | ready | signed | error
  const [doc, setDoc] = useState(null);
  const [signatureName, setSignatureName] = useState("");
  const [signatureId, setSignatureId] = useState("");
  const [signatureImage, setSignatureImage] = useState(null);
  const [busy, setBusy] = useState(false);
  const [logoUrl, setLogoUrl] = useState(null);
  const [clinicName, setClinicName] = useState("מרפאה — כרטיסי מטופלים");
  const token = new URLSearchParams(location.search).get("token");

  useEffect(() => {
    if (!token) { setPhase("notfound"); return; }
    (async () => {
      try {
        const fb = await waitForFbSign();
        fb.getPublicConfig().then((cfg) => {
          setLogoUrl(cfg.logoUrl || null);
          if (cfg.clinicName) { setClinicName(cfg.clinicName); document.title = `חתימה על מסמך — ${cfg.clinicName}`; }
        });
        const snap = await fb.getDoc(token);
        if (!snap.exists()) { setPhase("notfound"); return; }
        const data = snap.data();
        setDoc(data);
        setPhase(data.status === "signed" ? "signed" : "ready");
      } catch {
        setPhase("error");
      }
    })();
  }, [token]);

  async function handleSign() {
    if (!signatureName.trim() || !signatureImage) return;
    setBusy(true);
    try {
      const fb = await waitForFbSign();
      await fb.signDoc(token, signatureName.trim(), signatureId.trim(), signatureImage);
      setPhase("signed");
      setDoc((d) => ({ ...d, status: "signed", signedAt: new Date().toISOString(), signatureName: signatureName.trim(), signatureId: signatureId.trim(), signatureImage }));
    } catch {
      setPhase("error");
    }
    setBusy(false);
  }

  const wrap = (children) => (
    <div dir="rtl" style={{ fontFamily: "'Segoe UI', Heebo, Arial, sans-serif", background: COLORS.bg, minHeight: "100vh", padding: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ background: COLORS.surface, borderRadius: 16, padding: "28px 24px", width: "100%", maxWidth: 480, boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>
        {logoUrl && <img src={logoUrl} alt="לוגו המרפאה" style={{ maxHeight: 50, marginBottom: 16, display: "block", marginRight: "auto", marginLeft: "auto" }} />}
        {children}
      </div>
    </div>
  );

  if (phase === "loading") return wrap(<p style={{ color: COLORS.muted, textAlign: "center" }}>טוען…</p>);
  if (phase === "notfound") return wrap(<p style={{ color: COLORS.danger, textAlign: "center" }}>המסמך לא נמצא. ייתכן שהקישור שגוי או שפג תוקפו.</p>);
  if (phase === "error") return wrap(<p style={{ color: COLORS.danger, textAlign: "center" }}>אירעה שגיאה בטעינת המסמך. נסה/י לרענן את הדף.</p>);

  if (phase === "signed") {
    return wrap(
      <>
        <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.success, marginBottom: 10, textAlign: "center" }}>✓ המסמך נחתם בהצלחה</div>
        <p style={{ color: COLORS.muted, fontSize: 14, textAlign: "center", marginBottom: 4 }}>
          נחתם ע"י {doc?.signatureName}{doc?.signatureId ? ` · ת.ז. ${doc.signatureId}` : ""}
        </p>
        {doc?.signedAt && <p style={{ color: COLORS.muted, fontSize: 13, textAlign: "center", marginBottom: 16 }}>בתאריך {new Date(doc.signedAt).toLocaleDateString("he-IL")}</p>}
        {doc?.signatureImage && (
          <div style={{ textAlign: "center", marginBottom: 16 }}>
            <img src={doc.signatureImage} alt="חתימה" style={{ maxWidth: 260, border: `1px solid ${COLORS.border}`, borderRadius: 6 }} />
          </div>
        )}
        <div style={{ background: COLORS.bg, borderRadius: 10, padding: 16, fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{doc?.content}</div>
      </>
    );
  }

  const canSubmit = signatureName.trim() && signatureImage;

  return wrap(
    <>
      <h2 style={{ margin: "0 0 4px", fontSize: 19, color: COLORS.primary }}>{doc?.title}</h2>
      <p style={{ fontSize: 13, color: COLORS.muted, margin: "0 0 16px" }}>עבור: {doc?.patientName}</p>
      <div style={{ background: COLORS.bg, borderRadius: 10, padding: 16, fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-wrap", marginBottom: 18, maxHeight: 280, overflowY: "auto" }}>{doc?.content}</div>

      <label style={{ display: "block", fontSize: 12.5, fontWeight: 600, color: COLORS.muted, marginBottom: 6 }}>שם מלא</label>
      <input value={signatureName} onChange={(e) => setSignatureName(e.target.value)} placeholder="שם מלא"
        style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${COLORS.border}`, fontSize: 14, marginBottom: 14 }} />

      <label style={{ display: "block", fontSize: 12.5, fontWeight: 600, color: COLORS.muted, marginBottom: 6 }}>תעודת זהות (אופציונלי)</label>
      <input value={signatureId} onChange={(e) => setSignatureId(e.target.value)} placeholder="123456789" inputMode="numeric"
        style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${COLORS.border}`, fontSize: 14, marginBottom: 14 }} />

      <label style={{ display: "block", fontSize: 12.5, fontWeight: 600, color: COLORS.muted, marginBottom: 6 }}>חתימה בעכבר / אצבע / עט (חובה)</label>
      <div style={{ marginBottom: 16 }}>
        <SignaturePad onChange={setSignatureImage} />
      </div>

      <button onClick={handleSign} disabled={busy || !canSubmit}
        style={{ width: "100%", background: COLORS.primary, color: "#fff", border: "none", borderRadius: 8, padding: "12px", fontSize: 15, fontWeight: 700, cursor: busy ? "default" : "pointer", opacity: busy || !canSubmit ? 0.6 : 1 }}>
        {busy ? "שולח…" : "מאשר/ת וחותם/ת"}
      </button>
      <p style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 12, textAlign: "center" }}>לחיצה על הכפתור מהווה הסכמה דיגיטלית לתוכן המסמך שלמעלה. יש למלא שם מלא ולצייר חתימה כדי להמשיך.</p>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
